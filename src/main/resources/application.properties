# =========================================================
# Konfigurasi utama (base config, berlaku untuk semua profile)
# Jalankan dengan profile local: mvn quarkus:dev -Dquarkus.profile=local
# =========================================================

quarkus.application.name=ogya-rest-template-quarkus
quarkus.http.port=8080

# =========================================================
# JWT Configuration
# =========================================================
app.jwt.secret=b3d7d8f4a1c5e9b2f6a3c8d1e4b7f0a2d5c8e1b4f7a0d3c6e9b2f5a8d1e4b7f0
app.jwt.expiration=600000

# =========================================================
# File Upload
# =========================================================
app.file.upload-dir=uploads
quarkus.http.limits.max-body-size=10M

# =========================================================
# External REST API
# =========================================================
quarkus.rest-client.jsonplaceholder.url=https://jsonplaceholder.typicode.com

# =========================================================
# OpenAPI / Swagger UI
# =========================================================
quarkus.smallrye-openapi.path=/v3/api-docs
quarkus.swagger-ui.path=/swagger-ui.html
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.operations-sorter=method
quarkus.swagger-ui.tags-sorter=alpha

# =========================================================
# OpenTelemetry Tracing
# =========================================================
# Sample semua request agar traceId selalu terisi di log
quarkus.otel.traces.sampler=always_on

# =========================================================
# Logging — format sama dengan Spring Boot project
# traceId dan requestId diisi oleh RequestIdFilter ke MDC
# =========================================================
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} | %-5p | %t | %c{3.} | traceId=%X{traceId} | requestId=%X{requestId} | %s%e%n
quarkus.log.console.level=INFO

quarkus.log.file.enable=true
quarkus.log.file.path=logs/app.log
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss.SSS} | %-5p | %t | %c{3.} | traceId=%X{traceId} | requestId=%X{requestId} | %s%e%n
quarkus.log.file.level=INFO
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=30

# Log level khusus aplikasi
quarkus.log.category."com.example.template".level=DEBUG

# =========================================================
# Health & Metrics
# =========================================================
quarkus.smallrye-health.root-path=/actuator/health
