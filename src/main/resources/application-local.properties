# =========================================================
# Profile LOCAL: H2 in-memory, seed data otomatis, dev tools
# Jalankan: mvn quarkus:dev -Dquarkus.profile=local
# =========================================================

# H2 in-memory database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:logitrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# DDL: drop+create saat startup
quarkus.hibernate-orm.database.generation=drop-and-create

# Tampilkan SQL di log
quarkus.hibernate-orm.log.sql=true

# H2 Console (akses via Quarkus dev UI: /q/dev)
quarkus.datasource.devservices.enabled=false

# Log level lebih verbose
quarkus.log.console.level=DEBUG
quarkus.log.file.level=DEBUG
quarkus.log.category."com.example.template".level=DEBUG

# OTel — opsional, aktifkan jika Jaeger berjalan
# quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
